<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WEROS · 인생 패턴 분석 보고서</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8; --dark: #1a1510; --gold: #9a7a50;
      --gold-light: #c4a882; --cream: #faf7f2;
      --border: #e0d5c5; --text: #2c2418; --muted: #8a7a65;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', serif; min-height: 100vh; }

    /* ── 로딩 ── */
    #loadingScreen { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.6s; }
    #loadingScreen.fade-out { opacity: 0; pointer-events: none; }
    .loading-logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; letter-spacing: 0.35em; color: var(--gold-light); font-weight: 300; margin-bottom: 40px; }
    .loading-bar-wrap { width: 200px; height: 1px; background: rgba(154,122,80,0.2); }
    .loading-bar { height: 100%; background: var(--gold); width: 0; transition: width 0.4s ease; }
    .loading-text { margin-top: 20px; font-size: 11px; letter-spacing: 0.2em; color: var(--muted); }

    /* ── 오류 ── */
    #errorScreen { display: none; min-height: 100vh; align-items: center; justify-content: center; flex-direction: column; gap: 16px; text-align: center; padding: 40px; }
    .err-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; color: var(--gold); }
    .err-msg { font-size: 14px; color: var(--muted); line-height: 1.8; }

    /* ── 인쇄/PDF 버튼 ── */
    .print-bar { position: fixed; top: 0; right: 0; display: none; gap: 8px; padding: 12px 20px; z-index: 200; background: rgba(26,21,16,0.92); border-bottom-left-radius: 8px; align-items: center; }
    .print-bar.visible { display: flex; }
    .btn-pdf { font-family: 'Noto Serif KR', serif; font-size: 11px; letter-spacing: 0.08em; padding: 8px 18px; cursor: pointer; border: none; background: var(--gold); color: #fff; }
    .btn-pdf:hover { background: var(--gold-light); }
    .btn-print-only { font-family: 'Noto Serif KR', serif; font-size: 11px; letter-spacing: 0.08em; padding: 8px 16px; cursor: pointer; background: none; border: 1px solid rgba(154,122,80,0.5); color: var(--gold-light); }
    .btn-print-only:hover { border-color: var(--gold-light); }

    /* ── 헤더 ── */
    .report-header { background: var(--dark); padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 0.32em; color: var(--gold-light); font-weight: 300; }
    .header-right { font-size: 10px; letter-spacing: 0.2em; color: rgba(154,122,80,0.6); }

    /* ── 표지 ── */
    .cover { background: var(--dark); padding: 80px 48px 64px; min-height: 360px; display: flex; flex-direction: column; justify-content: flex-end; position: relative; overflow: hidden; }
    .cover::before { content: 'WEROS'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Cormorant Garamond', serif; font-size: 180px; font-weight: 300; color: rgba(154,122,80,0.04); letter-spacing: 0.3em; white-space: nowrap; pointer-events: none; }
    .cover-eyebrow { font-size: 9px; letter-spacing: 0.35em; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
    .cover-name { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; color: #f5f0e8; letter-spacing: 0.04em; line-height: 1.1; margin-bottom: 16px; }
    .cover-divider { width: 48px; height: 1px; background: var(--gold); opacity: 0.4; margin: 24px 0; }
    .cover-meta { font-size: 13px; color: var(--muted); line-height: 2; letter-spacing: 0.04em; }

    /* ── 본문 ── */
    .report-wrap { max-width: 780px; margin: 0 auto; padding: 64px 32px 100px; }
    .report-chapter { margin-bottom: 64px; padding-bottom: 56px; border-bottom: 1px solid var(--border); opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
    .report-chapter.visible { opacity: 1; transform: translateY(0); }
    .report-chapter:last-child { border-bottom: none; }
    h1, h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; color: var(--dark); letter-spacing: 0.02em; margin: 32px 0 16px; line-height: 1.3; }
    h3 { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--dark); margin: 24px 0 12px; }
    p { font-size: 15px; line-height: 2; color: var(--text); margin-bottom: 18px; }
    strong { color: var(--dark); font-weight: 600; }
    em { font-style: italic; color: var(--muted); }
    blockquote { border-left: 3px solid var(--gold); padding: 14px 22px; margin: 24px 0; background: var(--cream); color: var(--muted); font-style: italic; font-size: 14px; line-height: 1.9; }
    ul, ol { padding-left: 22px; margin-bottom: 18px; }
    li { font-size: 15px; line-height: 2; margin-bottom: 6px; color: var(--text); }

    /* ── 푸터 ── */
    .report-footer { background: var(--dark); padding: 40px 32px; text-align: center; }
    .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; letter-spacing: 0.3em; color: var(--gold); font-weight: 300; margin-bottom: 12px; }
    .footer-text { font-size: 11px; color: rgba(154,122,80,0.5); letter-spacing: 0.1em; line-height: 2; }

    @media (max-width: 640px) {
      .cover { padding: 60px 24px 48px; }
      .cover-name { font-size: 34px; }
      .report-wrap { padding: 48px 20px 80px; }
    }

    /* ══════════════════════════════════════════
       인쇄 / PDF 저장 전용 스타일
       화면 다크 → 인쇄 라이트로 완전 전환
    ══════════════════════════════════════════ */
    @media print {
      @page {
        size: A4 portrait;
        margin: 18mm 20mm 20mm 20mm;
      }

      /* 인쇄 불필요 요소 숨김 */
      #loadingScreen,
      #errorScreen,
      .print-bar { display: none !important; }

      /* 전체 흰 배경 */
      html, body {
        background: #ffffff !important;
        color: #1a1a1a !important;
        font-size: 10.5pt !important;
        line-height: 1.75 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* 표지: 흰 배경에 골드 라인 */
      .cover {
        background: #ffffff !important;
        border-bottom: 2pt solid #9a7a50 !important;
        padding: 48px 0 40px !important;
        min-height: auto !important;
        page-break-after: always;
        break-after: page;
      }
      .cover::before { display: none !important; }
      .cover-eyebrow { color: #9a7a50 !important; }
      .cover-name { color: #1a1510 !important; font-size: 30pt !important; }
      .cover-divider { background: #9a7a50 !important; opacity: 1 !important; }
      .cover-meta { color: #5a4a35 !important; }

      /* 헤더/푸터 인쇄용 */
      .report-header {
        background: #ffffff !important;
        border-bottom: 0.5pt solid #d0c8b8 !important;
      }
      .header-logo { color: #9a7a50 !important; }
      .header-right { color: #8a7a65 !important; }

      .report-footer {
        background: #f8f5f0 !important;
        border-top: 0.5pt solid #d0c8b8 !important;
      }
      .footer-logo { color: #9a7a50 !important; }
      .footer-text { color: #8a7a65 !important; }

      /* 본문 레이아웃 */
      .report-wrap {
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      /* 챕터: 페이지 내 잘림 방지 */
      .report-chapter {
        opacity: 1 !important;
        transform: none !important;
        page-break-inside: avoid;
        break-inside: avoid;
        border-bottom: 0.5pt solid #d0c8b8 !important;
        margin-bottom: 20pt !important;
        padding-bottom: 16pt !important;
      }

      /* 제목 */
      h1, h2 { color: #1a1510 !important; page-break-after: avoid; break-after: avoid; font-size: 18pt !important; }
      h3 { color: #2a1a0a !important; page-break-after: avoid; break-after: avoid; font-size: 14pt !important; }
      p { color: #1a1a1a !important; orphans: 3; widows: 3; }
      strong { color: #1a1510 !important; }
      em { color: #5a4a35 !important; }

      blockquote {
        background: #f8f5f0 !important;
        border-left-color: #9a7a50 !important;
        color: #5a4a35 !important;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* ── 차트/시각화 블록 인쇄용 ── */

      /* 다크 배경 블록 → 라이트 */
      [style*="background:#1a1510"],
      [style*="background: #1a1510"],
      [style*="background:#120f0a"],
      [style*="background:#0e0b07"] {
        background: #f4f0e8 !important;
        border: 0.5pt solid #c8baa8 !important;
      }

      /* 크림 배경 유지 */
      [style*="background:#faf7f2"],
      [style*="background:#f0ebe0"],
      [style*="background:#f8f5f0"] {
        background: #f8f5f0 !important;
      }

      /* 골드 텍스트 */
      [style*="color:#c8a870"],
      [style*="color:#9a7a50"],
      [style*="color:#9a8a6a"],
      [style*="color:#8a6a40"] {
        color: #7a5a30 !important;
      }

      /* 라이트 텍스트 (다크 배경 위) */
      [style*="color:#f5f0e8"],
      [style*="color:#e8dcc8"] {
        color: #1a1a1a !important;
      }

      /* 골드 바 */
      [style*="background:#c8a870"] { background: #9a7a50 !important; }
      [style*="background:#b0a080"] { background: #8a7060 !important; }

      /* SVG 레이더 차트 */
      svg { page-break-inside: avoid; break-inside: avoid; }
      svg polygon { fill: rgba(154,122,80,0.1) !important; stroke: #9a7a50 !important; stroke-width: 1.5px !important; }
      svg text { fill: #3a2a15 !important; }
      svg line { stroke: rgba(120,100,70,0.2) !important; }
      svg circle { fill: #9a7a50 !important; stroke: none !important; }

      /* 그리드/플렉스 차트 블록 잘림 방지 */
      [style*="display:grid"],
      [style*="display: grid"],
      [style*="display:flex"],
      [style*="display: flex"] {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      /* 테이블 (90일 플랜) */
      table {
        page-break-inside: avoid;
        break-inside: avoid;
        width: 100% !important;
        border-collapse: collapse !important;
      }
      thead tr { background: #f0ebe0 !important; }
      th { color: #3a2a15 !important; background: #f0ebe0 !important; }
      td { color: #1a1a1a !important; }

      /* 타임라인 라인 */
      [style*="background:linear-gradient"] {
        background: #c8baa8 !important;
      }

      /* 뱃지/칩 */
      [style*="background:#c8a870"][style*="padding"],
      [style*="background:#8a6a40"][style*="padding"] {
        background: #9a7a50 !important;
        color: #ffffff !important;
      }
    }
  </style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingScreen">
  <div class="loading-logo">W E R O S</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loadingBar"></div>
  </div>
  <div class="loading-text" id="loadingText">보고서를 불러오는 중입니다</div>
</div>

<!-- 오류 -->
<div id="errorScreen">
  <div class="err-title">보고서를 찾을 수 없습니다</div>
  <div class="err-msg" id="errorMsg">링크가 만료되었거나 잘못된 주소입니다.<br>담당자에게 문의해주세요.</div>
</div>

<!-- 인쇄/PDF 버튼 -->
<div class="print-bar" id="printBar">
  <span style="font-size:11px;color:rgba(154,122,80,0.7);letter-spacing:0.1em;margin-right:4px;">보고서 저장</span>
  <button class="btn-print-only" onclick="window.print()">🖨 인쇄</button>
  <button class="btn-pdf" onclick="savePdf()">⬇ PDF 저장</button>
</div>

<!-- 헤더 -->
<div class="report-header" id="reportHeader" style="display:none">
  <div class="header-logo">W E R O S</div>
  <div class="header-right">LIFE PATTERN REPORT</div>
</div>

<!-- 표지 -->
<div class="cover" id="reportCover" style="display:none">
  <div class="cover-eyebrow">WEROS · 인생 패턴 분석 보고서</div>
  <div class="cover-name" id="coverName">—</div>
  <div class="cover-divider"></div>
  <div class="cover-meta" id="coverMeta">—</div>
</div>

<!-- 본문 -->
<div class="report-wrap" id="reportBody" style="display:none"></div>

<!-- 푸터 -->
<div class="report-footer" id="reportFooter" style="display:none">
  <div class="footer-logo">W E R O S</div>
  <div class="footer-text">
    본 보고서는 WEROS 인생 패턴 분석 시스템에 의해 생성되었습니다.<br>
    무단 복제 및 배포를 금합니다.
  </div>
</div>

<script>
const SUPABASE_URL = 'https://wavhcknviozwadqyjlug.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhdmhja252aW96d2FkcXlqbHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTQ5NjksImV4cCI6MjA5MDQzMDk2OX0.frq_z3GgL8BEjHCRuVcdOqPLe0DhJp0k-joOXYVK_Ws';

const loadingBar = document.getElementById('loadingBar');
const loadingText = document.getElementById('loadingText');
let loadingProgress = 0;
const loadingTimer = setInterval(() => {
  loadingProgress = Math.min(loadingProgress + Math.random() * 15, 85);
  loadingBar.style.width = loadingProgress + '%';
}, 300);

function finishLoading() {
  clearInterval(loadingTimer);
  loadingBar.style.width = '100%';
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('fade-out');
    setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; }, 600);
  }, 400);
}

function showError(msg) {
  clearInterval(loadingTimer);
  document.getElementById('loadingScreen').style.display = 'none';
  const errScreen = document.getElementById('errorScreen');
  errScreen.style.display = 'flex';
  if (msg) document.getElementById('errorMsg').innerHTML = msg;
}

// PDF 저장 - 브라우저 인쇄 다이얼로그 (PDF 저장 선택)
// 파일명: WEROS_이름_인생패턴분석보고서
function savePdf() {
  const nameEl = document.getElementById('coverName');
  const name = nameEl ? nameEl.textContent.replace(' 님의 리포트', '').trim() : 'WEROS';
  const origTitle = document.title;
  document.title = 'WEROS_' + name + '_인생패턴분석보고서';
  window.print();
  setTimeout(() => { document.title = origTitle; }, 2000);
}

function showReport(row) {
  const name = row.name || '고객';
  document.getElementById('coverName').textContent = name + ' 님의 리포트';
  document.title = 'WEROS · ' + name + '님의 인생 패턴 분석 보고서';

  const parts = [];
  if (row.birth_year && row.birth_month && row.birth_day) {
    parts.push((row.cal_type || '양력') + ' ' + row.birth_year + '년 ' + row.birth_month + '월 ' + row.birth_day + '일');
  }
  if (row.gender) parts.push(row.gender);
  if (row.mbti) parts.push('MBTI · ' + row.mbti);
  document.getElementById('coverMeta').innerHTML = parts.join('<br>');

  const body = document.getElementById('reportBody');
  body.innerHTML = row.report_html || '';

  // 챕터 fade-in
  const chapters = body.querySelectorAll('.report-chapter');
  if (chapters.length > 0) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.05 });
    chapters.forEach(ch => observer.observe(ch));
  } else {
    body.style.opacity = '1';
  }

  document.getElementById('reportHeader').style.display = 'flex';
  document.getElementById('reportCover').style.display = 'flex';
  body.style.display = 'block';
  document.getElementById('reportFooter').style.display = 'block';
  document.getElementById('printBar').classList.add('visible');

  finishLoading();
}

async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError('보고서 ID가 없습니다.<br>올바른 링크로 접속해주세요.'); return; }

  try {
    loadingText.textContent = '데이터를 확인하는 중…';
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/life_reports?id=eq.' + encodeURIComponent(id) + '&select=*',
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY } }
    );
    if (!res.ok) throw new Error('데이터 조회 실패 (' + res.status + ')');
    const data = await res.json();
    if (!data || data.length === 0) { showError('보고서를 찾을 수 없습니다.<br>링크가 만료되었거나 잘못된 주소입니다.'); return; }
    const row = data[0];
    if (!row.report_html) { showError('보고서가 아직 준비되지 않았습니다.<br>담당자가 보고서를 생성 중입니다.<br>잠시 후 다시 확인해주세요.'); return; }
    loadingText.textContent = '보고서를 렌더링하는 중…';
    showReport(row);
  } catch (e) {
    showError('오류가 발생했습니다.<br>' + e.message);
  }
}

loadReport();
</script>
</body>
</html>
