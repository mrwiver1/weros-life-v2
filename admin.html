<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEROS · 운영자 분석 패널</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

:root {
  --bg:           #f5f0e8;
  --cream:        #fdfaf4;
  --white:        #ffffff;
  --dark:         #1c1710;       /* 헤더만 사용 */
  --gold:         #a07840;
  --gold-light:   #c49a58;
  --gold-pale:    #f0e4c8;
  --border:       #ddd4bc;
  --border-light: #eae4d4;
  --text:         #26200f;
  --text-sub:     #5a5040;
  --muted:        #8a7e68;
  --green:        #2a6a3a;
  --red:          #7a2020;
  --blue:         #2a3a6a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.6;
}

/* ── 헤더 (다크 유지) ── */
.admin-header {
  background: var(--dark);
  padding: 0 28px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.admin-header .logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; letter-spacing: 0.28em;
  color: #f0e8d8; font-weight: 300;
}
.admin-header .logo span { color: #d4aa6a; }
.admin-header .badge {
  font-size: 9px; letter-spacing: 0.22em;
  color: #c49a58; border: 1px solid #3a3020;
  padding: 4px 14px;
}

/* ── 레이아웃 ── */
.admin-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 52px);
}

/* ── 사이드바 (밝은 배경) ── */
.sidebar {
  background: var(--cream);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  max-height: calc(100vh - 52px);
  position: sticky; top: 52px;
}
.sidebar-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  font-size: 9px; letter-spacing: 0.2em; color: var(--muted);
  display: flex; justify-content: space-between; align-items: center;
}
.sidebar-header .count {
  background: var(--gold); color: #fff;
  font-size: 9px; padding: 2px 9px; border-radius: 10px;
}
.person-item {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer; transition: background 0.15s;
}
.person-item:hover { background: #ede8dc; }
.person-item.active {
  background: #e8e0cc;
  border-left: 3px solid var(--gold);
  padding-left: 15px;
}
.person-item .name {
  font-size: 14px; font-weight: 500;
  color: var(--text); margin-bottom: 3px;
}
.person-item .name small {
  font-size: 11px; color: var(--gold);
  font-weight: 300; margin-left: 4px;
}
.person-item .meta {
  font-size: 11px; color: var(--text-sub); line-height: 1.8;
}
.status {
  display: inline-block; font-size: 9px;
  padding: 3px 10px; margin-top: 6px; letter-spacing: 0.1em;
}
.status-pending { background: #faf0d8; color: #8a6020; border: 1px solid #e8d098; }
.status-done    { background: #e8f4ec; color: var(--green); border: 1px solid #a8d8b8; }
.status-sent    { background: #e8ecf4; color: var(--blue);  border: 1px solid #a8b8d8; }

/* ── 메인 패널 ── */
.main-panel { padding: 28px 32px; overflow-y: auto; }

/* ── 빈 상태 ── */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 60vh; color: var(--muted); gap: 14px;
}
.empty-state .icon { font-size: 36px; opacity: 0.2; }
.empty-state p { font-size: 12px; letter-spacing: 0.12em; }

/* ── 고객 요약 (골드 라인만) ── */
.client-summary {
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 4px solid var(--gold);
  padding: 18px 22px; margin-bottom: 24px;
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 20px;
}
.client-summary .client-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px; font-weight: 400;
  color: var(--text); letter-spacing: 0.04em; margin-bottom: 6px;
}
.client-summary .client-meta {
  font-size: 12px; color: var(--text-sub); line-height: 2;
}
.btn-regenerate {
  background: var(--bg); color: var(--text-sub);
  border: 1px solid var(--border);
  padding: 8px 16px;
  font-family: 'Noto Serif KR', serif; font-size: 11px;
  cursor: pointer; letter-spacing: 0.08em;
  white-space: nowrap; align-self: center;
  transition: all 0.2s;
}
.btn-regenerate:hover { border-color: var(--gold); color: var(--gold); }

/* ── 섹션 ── */
.section { margin-bottom: 24px; }
.section-label {
  font-size: 9px; letter-spacing: 0.22em; color: var(--muted);
  padding-bottom: 8px; margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.section-label .num {
  background: var(--dark); color: #d4aa6a;
  font-size: 9px; padding: 3px 9px; letter-spacing: 0.12em;
}

/* ── 사주 그리드 ── */
.saju-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  border: 1px solid var(--border);
  background: var(--border); gap: 1px; margin-bottom: 1px;
}
.saju-col { background: var(--white); }
.saju-col .col-header {
  background: #2c2418; color: #d4b880;
  text-align: center; font-size: 9px;
  letter-spacing: 0.18em; padding: 9px 6px; font-weight: 300;
}
.saju-col .gan-sub {
  text-align: center; font-size: 9px;
  color: var(--gold); padding: 6px 4px 1px; min-height: 22px;
}
.saju-col .gan {
  text-align: center; font-size: 32px;
  font-family: 'Cormorant Garamond', serif;
  padding: 2px 8px; color: var(--text); font-weight: 400;
}
.saju-col .zhi {
  text-align: center; font-size: 32px;
  font-family: 'Cormorant Garamond', serif;
  padding: 2px 8px; color: var(--text); font-weight: 400;
  border-top: 1px solid var(--border-light);
}
.saju-col .zhi-sub {
  text-align: center; font-size: 9px;
  color: var(--muted); padding: 2px 4px; min-height: 18px;
}
.saju-col .changsheng {
  text-align: center; font-size: 10px; color: #3a6070; padding: 2px 4px;
}
.saju-col .nayin-text {
  text-align: center; font-size: 9px; color: var(--muted); padding: 2px 4px 9px;
}

/* ── 지장간 ── */
.hg-row {
  display: grid; grid-template-columns: repeat(4,1fr);
  border: 1px solid var(--border); border-top: none;
  background: var(--border); gap: 1px; margin-bottom: 14px;
}
.hg-cell { background: var(--cream); padding: 9px 13px; }
.hg-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 3px; }
.hg-val { font-size: 12px; color: var(--text); }

/* ── 대운 ── */
.dayun-table {
  width: 100%; border-collapse: collapse;
  font-size: 12px; margin-bottom: 14px;
}
.dayun-table th {
  background: #2c2418; color: #c8a860;
  padding: 9px 12px; text-align: center;
  font-weight: 300; letter-spacing: 0.12em; font-size: 9px;
}
.dayun-table td {
  padding: 8px 12px; text-align: center;
  border-bottom: 1px solid var(--border-light);
  background: var(--white); color: var(--text);
}
.dayun-table tr:hover td { background: #f5f0e4; }
.dayun-current td { background: var(--gold-pale) !important; font-weight: 500; }
.dayun-current td:first-child { color: var(--gold); font-size: 11px; }

/* ── 신살 ── */
.sinsal-box {
  background: var(--white); border: 1px solid var(--border);
  padding: 16px; margin-bottom: 14px;
}
.sinsal-group-label {
  font-size: 9px; letter-spacing: 0.18em; color: var(--muted); margin-bottom: 9px;
}
.sinsal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.sinsal-tag {
  font-size: 11px; padding: 4px 12px; letter-spacing: 0.03em;
  border: 1px solid var(--border); background: var(--bg); color: var(--text-sub);
}
.sinsal-tag.active-good { background: #e8f4ec; border-color: #80b890; color: var(--green); }
.sinsal-tag.active-bad  { background: #f4e8e8; border-color: #c09090; color: var(--red);   }
.sinsal-tag.active-neu  { background: #eaecf4; border-color: #9098c0; color: var(--blue);  }

/* ── 수리 카드 ── */
.suri-card {
  background: var(--white); border: 1px solid var(--border);
  padding: 16px; margin-bottom: 12px;
}
.suri-title { font-size: 9px; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 13px; }
.suri-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 10px; }
.gua-row  { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 10px; }
.suri-item label {
  display: block; font-size: 10px; color: var(--muted);
  letter-spacing: 0.08em; margin-bottom: 5px;
}
.suri-item input {
  width: 100%; background: var(--bg);
  border: none; border-bottom: 1px solid var(--border);
  padding: 7px 8px;
  font-family: 'Noto Serif KR', serif; font-size: 13px; color: var(--text);
  outline: none; transition: border-color 0.2s;
}
.suri-item input:focus { border-bottom: 2px solid var(--gold); }

/* ── 수리 2열 레이아웃 ── */
.suri-row-2col { width: 100%; }
.suri-field-block { width: 100%; }
.suri-field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 0;
}
.suri-desc-row2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 8px;
}

/* ── 수리 설명 ── */
.suri-desc-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 8px; margin-top: 12px; margin-bottom: 4px;
}
.suri-desc-item {
  border-left: 3px solid transparent;
  padding: 0; font-size: 11px;
  line-height: 1.7; overflow: hidden;
  max-height: 0; transition: all 0.25s;
}
.suri-desc-item.visible { padding: 10px 11px; max-height: 300px; background: var(--cream); }
.suri-desc-item.luck-5 { border-left-color: #b8924a; }
.suri-desc-item.luck-4 { border-left-color: #5aaa7a; }
.suri-desc-item.luck-3 { border-left-color: #7080b0; }
.suri-desc-item.luck-2 { border-left-color: #c09050; }
.suri-desc-item.luck-1 { border-left-color: #c07070; }
.suri-desc-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
}
.suri-luck-badge { font-size: 9px; padding: 1px 7px; letter-spacing: 0.08em; }
.luck-5 .suri-luck-badge { background: var(--gold-pale); color: var(--gold); }
.luck-4 .suri-luck-badge { background: #e8f4ec; color: var(--green); }
.luck-3 .suri-luck-badge { background: #eaecf4; color: var(--blue); }
.luck-2 .suri-luck-badge { background: #f4ece8; color: #8a4020; }
.luck-1 .suri-luck-badge { background: #f4e8e8; color: var(--red); }
.suri-desc-text { font-size: 11px; color: var(--text-sub); line-height: 1.7; }

/* ── 주역괘 설명 ── */
.gua-desc-box {
  background: var(--cream); border-left: 3px solid var(--gold);
  padding: 0; font-size: 11px; line-height: 1.7;
  margin-top: 6px; overflow: hidden;
  max-height: 0; transition: all 0.25s;
}
.gua-desc-box.visible { padding: 10px 11px; max-height: 300px; }
.gua-sym { font-size: 18px; margin-right: 5px; }
.gua-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.gua-meaning { font-size: 10px; color: var(--gold); margin-bottom: 4px; letter-spacing: 0.05em; }
.gua-desc-text { font-size: 11px; color: var(--text-sub); line-height: 1.7; }

/* ── 메모/노트 ── */
.analysis-box, .note-box {
  background: var(--white); border: 1px solid var(--border); padding: 16px;
}
.analysis-box { margin-bottom: 20px; }
.note-box { margin-top: 0; }
.analysis-box label, .note-box label {
  display: block; font-size: 9px; letter-spacing: 0.18em;
  color: var(--muted); margin-bottom: 9px;
}
.analysis-box textarea, .note-box textarea {
  width: 100%; background: var(--bg);
  border: 1px solid var(--border-light);
  padding: 12px 13px;
  font-family: 'Noto Serif KR', serif; font-size: 13px;
  line-height: 1.9; color: var(--text);
  resize: vertical; outline: none; transition: border-color 0.2s;
}
.analysis-box textarea { min-height: 110px; }
.note-box textarea { min-height: 80px; font-size: 12px; }
.analysis-box textarea:focus, .note-box textarea:focus { border-color: var(--gold); }

/* ── 액션 버튼 ── */
.action-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.btn-generate {
  background: var(--dark); color: #f0e8d8; border: none;
  padding: 15px; font-family: 'Noto Serif KR', serif; font-size: 13px;
  cursor: pointer; letter-spacing: 0.1em; transition: opacity 0.2s;
}
.btn-generate:hover { opacity: 0.82; }
.btn-preview {
  background: var(--white); color: var(--text);
  border: 1px solid var(--border); padding: 15px;
  font-family: 'Noto Serif KR', serif; font-size: 13px;
  cursor: pointer; letter-spacing: 0.1em; transition: background 0.2s;
}
.btn-preview:hover { background: var(--bg); }

/* ── 발송 프로세스 ── */
.process-bar {
  background: var(--cream); border: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center;
  justify-content: center; gap: 12px;
  font-size: 10px; letter-spacing: 0.12em; margin-bottom: 14px;
}
.process-bar .step { color: var(--muted); transition: color 0.3s; }
.process-bar .step.active { color: var(--gold); font-weight: 500; }
.process-bar .arrow { color: var(--border); }

/* ── 반응형 ── */
@media (max-width: 768px) {
  .admin-layout { grid-template-columns: 1fr; }
  .sidebar { max-height: 220px; position: static; }
  .saju-grid { grid-template-columns: repeat(2,1fr); }
  .suri-row { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- ── 비밀번호 잠금 ── -->
<div id="lockScreen" style="position:fixed;inset:0;background:#1c1710;display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="text-align:center">
    <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;letter-spacing:0.3em;color:#d4aa6a;margin-bottom:32px">WEROS · ADMIN</div>
    <div style="margin-bottom:16px">
      <input type="password" id="pwInput" placeholder="비밀번호 입력"
        style="background:#2c2418;border:1px solid #4a3c20;color:#f0e8d8;padding:12px 18px;font-size:14px;width:240px;outline:none;text-align:center;letter-spacing:0.1em;font-family:'Noto Serif KR',serif"
        onkeydown="if(event.key==='Enter') checkPW()">
    </div>
    <button onclick="checkPW()"
      style="background:#b8924a;color:#fff;border:none;padding:11px 32px;font-size:13px;cursor:pointer;letter-spacing:0.1em;font-family:'Noto Serif KR',serif">
      입장
    </button>
    <div id="pwError" style="color:#c07070;font-size:12px;margin-top:12px;height:18px"></div>
  </div>
</div>

<script>
(function() {
  // 세션 동안 잠금 해제 유지
  if (sessionStorage.getItem('weros_admin_auth') === 'true') {
    document.getElementById('lockScreen').style.display = 'none';
  }
})();

function checkPW() {
  var pw = document.getElementById('pwInput').value;
  // 비밀번호: weros2026 (변경 원하시면 말씀해 주세요)
  if (pw === 'weros2026') {
    sessionStorage.setItem('weros_admin_auth', 'true');
    document.getElementById('lockScreen').style.display = 'none';
  } else {
    document.getElementById('pwError').textContent = '비밀번호가 틀렸습니다.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>

<!-- ── 헤더 ── -->
<div class="admin-header">
  <div class="logo">WEROS · <span>OPERATOR</span></div>
  <div class="badge">ADMIN PANEL</div>
</div>

<div class="admin-layout">

  <!-- ── 사이드바: 제출자 목록 ── -->
  <div class="sidebar">
    <div class="sidebar-header">
      대기 중인 분석 요청
      <span class="count" id="pendingCount">0</span>
    </div>
    <div id="personList">
      <!-- JS로 렌더링 -->
    </div>
  </div>

  <!-- ── 메인 패널 ── -->
  <div class="main-panel" id="mainPanel">

    <!-- 빈 상태 -->
    <div class="empty-state" id="emptyState">
      <div class="icon">⊹</div>
      <p>좌측에서 분석 요청을 선택하세요</p>
    </div>

    <!-- 분석 패널 (선택 시 표시) -->
    <div id="analysisPanel" class="hidden">

      <!-- 고객 요약 -->
      <div class="client-summary">
        <div class="main-info">
          <div class="client-name" id="clientName">—</div>
          <div class="client-meta" id="clientMeta">—</div>
        </div>
        <button class="btn-regenerate" onclick="regenerateSaju()">↺ 재계산</button>
      </div>

      <!-- (1) 사주 정보 -->
      <div class="section">
        <div class="section-label">
          <span class="num">01</span> 사주 원국
        </div>
        <div class="saju-grid" id="sajuGrid">
          <!-- JS로 렌더링 -->
        </div>

        <!-- 지장간 -->
        <div class="hg-row">
          <div class="hg-cell"><div class="hg-label">년지 지장간</div><div class="hg-val" id="hg-year">—</div></div>
          <div class="hg-cell"><div class="hg-label">월지 지장간</div><div class="hg-val" id="hg-month">—</div></div>
          <div class="hg-cell"><div class="hg-label">일지 지장간</div><div class="hg-val" id="hg-day">—</div></div>
          <div class="hg-cell"><div class="hg-label">시지 지장간</div><div class="hg-val" id="hg-time">—</div></div>
        </div>

        <!-- 대운 -->
        <table class="dayun-table" id="dayunTable">
          <thead>
            <tr>
              <th>구분</th>
              <th>나이</th>
              <th>대운 간지</th>
              <th>기간</th>
            </tr>
          </thead>
          <tbody id="dayunBody">
          </tbody>
        </table>
      </div>

      <!-- (2) 신살 -->
      <div class="section">
        <div class="section-label">
          <span class="num">02</span> 신살 · 합충형파해
        </div>
        <div class="sinsal-box">
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
            <div>
              <div class="sinsal-group-label">길신 (吉神)</div>
              <div class="sinsal-tags" id="sinsal-good"></div>
            </div>
            <div>
              <div class="sinsal-group-label">흉살 (凶殺)</div>
              <div class="sinsal-tags" id="sinsal-bad"></div>
            </div>
            <div>
              <div class="sinsal-group-label">합충형 (合冲刑)</div>
              <div class="sinsal-tags" id="sinsal-rel"></div>
            </div>
          </div>
          <div style="margin-top:12px;">
            <div class="sinsal-group-label">공망 (空亡)</div>
            <span id="sinsal-gongmang" class="sinsal-tag">—</span>
          </div>
        </div>
      </div>

      <!-- (3) 한글 이름 수리 -->
      <div class="section">
        <div class="section-label">
          <span class="num">03</span> 한글 이름 수리
        </div>
        <div class="suri-card">

<script>
// ══════════════════════════════════════════
// Supabase 설정

const SUPABASE_URL = 'https://wavhcknviozwadqyjlug.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indhdmhja252aW96d2FkcXlqbHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTQ5NjksImV4cCI6MjA5MDQzMDk2OX0.frq_z3GgL8BEjHCRuVcdOqPLe0DhJp0k-joOXYVK_Ws';

async function supabaseFetch(path, options = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Supabase error: ' + err);
  }
  return res.json();
}

// DB 레코드 → 내부 형식 변환
function dbRowToRequest(row) {
  let answers = {};
  try { answers = typeof row.answers === 'string' ? JSON.parse(row.answers) : (row.answers || {}); } catch(e) {}
  return {
    id:        row.id,
    name:      row.name      || '',
    nameHanja: row.name_hanja || '',
    gender:    row.gender    || '남성',
    birthYear:  parseInt(row.birth_year)  || 0,
    birthMonth: parseInt(row.birth_month) || 1,
    birthDay:   parseInt(row.birth_day)   || 1,
    birthHour:  row.birth_hour !== null && row.birth_hour !== undefined ? parseInt(row.birth_hour) : null,
    birthMin:   row.birth_min  !== null && row.birth_min  !== undefined ? parseInt(row.birth_min)  : null,
    calType:   row.cal_type  || '양력',
    email:     row.email     || '',
    concern:   row.concern   || '',
    mbti:      row.mbti      || '',
    answers:   answers,
    // 수리 필드 (운영자가 입력하면 저장됨)
    koWon:    row.ko_won   ? parseInt(row.ko_won)   : null,
    koHyung:  row.ko_hyung ? parseInt(row.ko_hyung) : null,
    koYi:     row.ko_yi    ? parseInt(row.ko_yi)    : null,
    koJung:   row.ko_jung  ? parseInt(row.ko_jung)  : null,
    status:    row.status || 'pending',
    reportHtml: row.report_html || '',
    submittedAt: row.created_at ? row.created_at.replace('T', ' ').slice(0, 16) : '',
  };
}

let ALL_REQUESTS = [];
let currentRequest = null;
let currentSaju = null;

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
async function init() {
  showSidebarLoading();
  try {
    const rows = await supabaseFetch(
      'life_reports?select=*&order=created_at.desc&limit=50'
    );
    ALL_REQUESTS = rows.map(dbRowToRequest);
    renderPersonList();
  } catch(e) {
    console.error('Supabase 로딩 오류:', e);
    showSidebarError(e.message);
  }
}

function showSidebarLoading() {
  const list = document.getElementById('personList');
  list.innerHTML = '<div style="padding:24px 18px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:0.1em">데이터 로딩 중…</div>';
}

function showSidebarError(msg) {
  const list = document.getElementById('personList');
  list.innerHTML = '<div style="padding:18px;color:var(--red);font-size:11px;line-height:1.8">로딩 실패<br><span style="color:var(--muted)">' + msg + '</span></div>';
}

function renderPersonList() {
  const list = document.getElementById('personList');
  const count = ALL_REQUESTS.filter(r => r.status === 'pending').length;
  document.getElementById('pendingCount').textContent = count;

  if (ALL_REQUESTS.length === 0) {
    list.innerHTML = '<div style="padding:24px 18px;text-align:center;color:var(--muted);font-size:11px;letter-spacing:0.1em">제출된 요청이 없습니다</div>';
    return;
  }

  list.innerHTML = ALL_REQUESTS.map(r => `
    <div class="person-item ${currentRequest?.id === r.id ? 'active' : ''}"
         onclick="selectRequest('${r.id}')">
      <div class="name">${r.name} <small style="font-size:11px;opacity:0.7">${r.nameHanja||''}</small></div>
      <div class="meta">${r.birthYear}.${String(r.birthMonth).padStart(2,'0')}.${String(r.birthDay).padStart(2,'0')} · ${r.gender}</div>
      <div class="meta">${r.submittedAt}</div>
      <span class="status status-${r.status}">
        ${{pending:'검토 대기', done:'생성 완료', sent:'발송 완료'}[r.status]}
      </span>
    </div>
  `).join('');
}

// ══════════════════════════════════════════
// 요청 선택
// ══════════════════════════════════════════
function selectRequest(id) {
  currentRequest = ALL_REQUESTS.find(r => r.id === id);
  if (!currentRequest) return;

  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('analysisPanel').classList.remove('hidden');

  renderClientSummary();
  computeAndRenderSaju();
  setTimeout(populateSuriFields, 300);
  renderPersonList(); // 선택 상태 업데이트
}

function renderClientSummary() {
  const r = currentRequest;
  document.getElementById('clientName').textContent =
    r.name + (r.nameHanja ? ` · ${r.nameHanja}` : '');

  const timeStr = r.birthHour !== null
    ? ` · ${r.birthHour}시 ${r.birthMin||0}분`
    : ' · 시간 미상';
  document.getElementById('clientMeta').innerHTML =
    `${r.calType} ${r.birthYear}년 ${r.birthMonth}월 ${r.birthDay}일${timeStr}<br>` +
    `${r.gender} · ${r.email}<br>` +
    `<span style="opacity:0.8">${r.concern}</span>`;
}

// ══════════════════════════════════════════
// 사주 계산 및 렌더링
// ══════════════════════════════════════════
function computeAndRenderSaju() {
  const r = currentRequest;
  try {
    currentSaju = calcSaju(
      r.birthYear, r.birthMonth, r.birthDay,
      r.birthHour, r.birthMin,
      r.calType === '음력',
      r.gender
    );
    renderSajuGrid(currentSaju);
    renderSinsal(currentSaju.sinsal);
    renderDayun(currentSaju.daYun, r.birthYear);
  } catch(e) {
    console.error('사주 계산 오류:', e);
    document.getElementById('sajuGrid').innerHTML =
      '<div style="padding:16px;color:var(--red);grid-column:span 4">사주 계산 오류: ' + e.message + '</div>';
  }
}

function renderSajuGrid(s) {
  const cols = [
    { label: '시주 (時)', gan: s.time.gan, zhi: s.time.zhi,
      shishenGan: s.shishen.timeGan, shishenZhi: s.shishen.timeZhi,
      cs: s.changSheng.time, nayin: s.naYin.time },
    { label: '일주 (日)', gan: s.day.gan, zhi: s.day.zhi,
      shishenGan: '일원', shishenZhi: s.shishen.dayZhi,
      cs: s.changSheng.day, nayin: s.naYin.day },
    { label: '월주 (月)', gan: s.month.gan, zhi: s.month.zhi,
      shishenGan: s.shishen.monthGan, shishenZhi: s.shishen.monthZhi,
      cs: s.changSheng.month, nayin: s.naYin.month },
    { label: '년주 (年)', gan: s.year.gan, zhi: s.year.zhi,
      shishenGan: s.shishen.yearGan, shishenZhi: s.shishen.yearZhi,
      cs: s.changSheng.year, nayin: s.naYin.year },
  ];

  document.getElementById('sajuGrid').innerHTML = cols.map(c => `
    <div class="saju-col">
      <div class="col-header">${c.label}</div>
      <div class="gan-sub">${Array.isArray(c.shishenGan) ? c.shishenGan.join(' ') : c.shishenGan}</div>
      <div class="gan">${c.gan !== '-' ? c.gan : '—'}</div>
      <div class="zhi">${c.zhi !== '-' ? c.zhi : '—'}</div>
      <div class="zhi-sub">${Array.isArray(c.shishenZhi) ? c.shishenZhi.join(' ') : c.shishenZhi}</div>
      <div class="changsheng">${c.cs}</div>
      <div style="text-align:center;font-size:10px;color:var(--muted);padding:2px 4px 8px">${c.nayin}</div>
    </div>
  `).join('');

  // 지장간
  document.getElementById('hg-year').textContent  = s.hideGan.year.join(' · ') || '—';
  document.getElementById('hg-month').textContent = s.hideGan.month.join(' · ') || '—';
  document.getElementById('hg-day').textContent   = s.hideGan.day.join(' · ') || '—';
  document.getElementById('hg-time').textContent  = s.hideGan.time.length ? s.hideGan.time.join(' · ') : '—';
}

function renderSinsal(ss) {
  // 길신
  const goodEl = document.getElementById('sinsal-good');
  const goodItems = [];
  if (ss.천을귀인_있음) goodItems.push({label: '천을귀인 ('+ss.천을귀인_해당.join(',')+')', cls: 'active-good'});
  if (ss.문창귀인_있음) goodItems.push({label: '문창귀인 ('+ss.문창귀인+')', cls: 'active-good'});
  if (ss.삼합.length)   goodItems.push(...ss.삼합.map(v => ({label: v, cls: 'active-good'})));
  if (ss.지지육합.length) goodItems.push(...ss.지지육합.map(v => ({label: v, cls: 'active-neu'})));
  goodEl.innerHTML = (goodItems.length ? goodItems : [{label:'없음',cls:''}])
    .map(i => `<span class="sinsal-tag ${i.cls}">${i.label}</span>`).join('');

  // 흉살
  const badEl = document.getElementById('sinsal-bad');
  const badItems = [];
  if (ss.양인_있음)   badItems.push({label: '양인 ('+ss.양인+')', cls: 'active-bad'});
  if (ss.백호대살)    badItems.push({label: '백호대살', cls: 'active-bad'});
  if (ss.괴강살)      badItems.push({label: '괴강살', cls: 'active-bad'});
  if (ss.고란살)      badItems.push({label: '고란살', cls: 'active-bad'});
  if (ss.역마_있음)   badItems.push({label: '역마 ('+ss.역마+')', cls: 'active-neu'});
  if (ss.도화_있음)   badItems.push({label: '도화 ('+ss.도화+')', cls: 'active-neu'});
  if (ss.화개_있음)   badItems.push({label: '화개 ('+ss.화개+')', cls: 'active-neu'});
  badEl.innerHTML = (badItems.length ? badItems : [{label:'없음',cls:''}])
    .map(i => `<span class="sinsal-tag ${i.cls}">${i.label}</span>`).join('');

  // 합충형
  const relEl = document.getElementById('sinsal-rel');
  const relItems = [];
  if (ss.천간합.length) relItems.push(...ss.천간합.map(v=>({label:v, cls:'active-neu'})));
  if (ss.충.length)     relItems.push(...ss.충.map(v=>({label:v, cls:'active-bad'})));
  if (ss.형.length)     relItems.push(...ss.형.map(v=>({label:v, cls:'active-bad'})));
  relEl.innerHTML = (relItems.length ? relItems : [{label:'없음',cls:''}])
    .map(i => `<span class="sinsal-tag ${i.cls}">${i.label}</span>`).join('');

  // 공망
  document.getElementById('sinsal-gongmang').textContent = ss.공망 || '—';
}

function renderDayun(daYunList, birthYear) {
  const currentYear = new Date().getFullYear();
  const tbody = document.getElementById('dayunBody');
  tbody.innerHTML = daYunList.slice(1).map((d, i) => {
    const isCurrent = d.startYear <= currentYear && d.endYear >= currentYear;
    return `<tr class="${isCurrent ? 'dayun-current' : ''}">
      <td>${isCurrent ? '▶ 현재' : ''}</td>
      <td>${d.startAge}~${d.endAge}세</td>
      <td style="font-size:15px;font-family:'Cormorant Garamond',serif">${d.ganzhiKo} <small style="font-size:10px;color:var(--muted)">${d.ganzhi}</small></td>
      <td style="font-size:11px;color:var(--muted)">${d.startYear}~${d.endYear}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════
// 재계산
// ══════════════════════════════════════════
// 수리 입력값 자동 채우기 + 설명 트리거
function populateSuriFields() {
  var r = currentRequest;
  if (!r) return;

  // 한글 수리값 (currentRequest에 있으면 채우기)
  var fields = [
    ['ko-won',   r.koWon],
    ['ko-hyung', r.koHyung],
    ['ko-yi',    r.koYi],
    ['ko-jung',  r.koJung],
    ['hj-won',   r.hjWon],
    ['hj-hyung', r.hjHyung],
    ['hj-yi',    r.hjYi],
    ['hj-jung',  r.hjJung],
  ];
  fields.forEach(function(f) {
    var el = document.getElementById(f[0]);
    if (el && f[1]) {
      el.value = f[1];
      // 설명 자동 표시
      showSuriDesc(f[0], f[1], f[0] + '-desc');
    }
  });

  // 주역괘 자동 표시
  var guaFields = [
    ['ko-gua-e', r.koGuaE, 'ko-gua-e-desc'],
    ['ko-gua-m', r.koGuaM, 'ko-gua-m-desc'],
    ['ko-gua-l', r.koGuaL, 'ko-gua-l-desc'],
    ['hj-gua-e', r.hjGuaE, 'hj-gua-e-desc'],
    ['hj-gua-m', r.hjGuaM, 'hj-gua-m-desc'],
    ['hj-gua-l', r.hjGuaL, 'hj-gua-l-desc'],
  ];
  guaFields.forEach(function(f) {
    var el = document.getElementById(f[0]);
    if (el && f[1]) {
      el.value = f[1];
      showGuaDesc(f[1], f[2]);
    }
  });

  // 오행 구성 표시
  var koOhang = document.getElementById('ko-ohang-display');
  var hjOhang = document.getElementById('hj-ohang-display');
  if (koOhang) koOhang.textContent = r.koOhang || (currentSaju ? getOhangStr(currentSaju) : '—');
  if (hjOhang) hjOhang.textContent = r.hjOhang || (currentSaju ? getOhangStr(currentSaju) : '—');
}

// 사주 오행 문자열 생성
function getOhangStr(s) {
  if (!s || !s.wuxing) return '—';
  var map = {'木':'목','火':'화','土':'토','金':'금','水':'수'};
  function toKo(str) {
    return str.split('').map(function(c){ return map[c]||c; }).join('');
  }
  return '년' + toKo(s.wuxing.year) + ' 월' + toKo(s.wuxing.month) + ' 일' + toKo(s.wuxing.day) + ' 시' + toKo(s.wuxing.time);
}

function regenerateSaju() {
  if (!currentRequest) return;
  computeAndRenderSaju();
  setTimeout(populateSuriFields, 300);
  alert('✓ 사주 재계산 완료');
}

// ══════════════════════════════════════════
// 수리 저장 (Supabase)
// ══════════════════════════════════════════
async function saveSuriToDb() {
  if (!currentRequest) return;
  const patch = {
    ko_won:   parseInt(document.getElementById('ko-won').value)   || null,
    ko_hyung: parseInt(document.getElementById('ko-hyung').value) || null,
    ko_yi:    parseInt(document.getElementById('ko-yi').value)    || null,
    ko_jung:  parseInt(document.getElementById('ko-jung').value)  || null,
  };
  try {
    await supabaseFetch(
      'life_reports?id=eq.' + currentRequest.id,
      { method: 'PATCH', body: JSON.stringify(patch) }
    );
    // 로컬 캐시도 업데이트
    Object.assign(currentRequest, {
      koWon: patch.ko_won, koHyung: patch.ko_hyung,
      koYi: patch.ko_yi,  koJung: patch.ko_jung,
    });
  } catch(e) {
    console.error('수리 저장 오류:', e);
  }
}

// ══════════════════════════════════════════
// 보고서 생성 (Claude API → Supabase 저장)
// ══════════════════════════════════════════
async function generateReport() {
  if (!currentRequest || !currentSaju) return;

  // 먼저 수리값 저장
  await saveSuriToDb();

  const btn = document.querySelector('.btn-generate');
  const step2 = document.getElementById('step2');
  btn.textContent = '생성 중…';
  btn.disabled = true;
  step2.classList.add('active');

  const r = currentRequest;
  const s = currentSaju;
  const memo = document.getElementById('operatorMemo').value;
  const profileNote = document.getElementById('profileNote').value;

  // 수리 정보
  const koWon   = document.getElementById('ko-won').value;
  const koHyung = document.getElementById('ko-hyung').value;
  const koYi    = document.getElementById('ko-yi').value;
  const koJung  = document.getElementById('ko-jung').value;

  const prompt = `당신은 WEROS Life Report를 작성하는 이름·사주 분석 전문가입니다.

## 의뢰인 정보
- 이름: ${r.name}${r.nameHanja ? ' ('+r.nameHanja+')' : ''}
- 성별: ${r.gender}
- 생년월일: ${r.birthYear}년 ${r.birthMonth}월 ${r.birthDay}일 (${r.calType})${r.birthHour !== null ? ' '+r.birthHour+'시 '+( r.birthMin||0)+'분' : ' (시간 미상)'}
- 이메일: ${r.email}
- 주요 고민: ${r.concern}
${r.mbti ? '- MBTI: '+r.mbti : ''}

## 사주 정보
- 년주: ${s.year.full} (${s.year.han})
- 월주: ${s.month.full} (${s.month.han})
- 일주: ${s.day.full} (${s.day.han})
- 시주: ${s.time.full}
- 일간: ${s.dayGan}
- 십이운성: 년${s.changSheng.year} / 월${s.changSheng.month} / 일${s.changSheng.day}

## 신살
- 천을귀인: ${s.sinsal.천을귀인_있음 ? '있음 ('+s.sinsal.천을귀인_해당.join(',')+')' : '없음'}
- 역마: ${s.sinsal.역마_있음 ? '있음' : '없음'}
- 도화: ${s.sinsal.도화_있음 ? '있음' : '없음'}
- 백호대살: ${s.sinsal.백호대살 ? '있음' : '없음'}
- 공망: ${s.sinsal.공망}

## 한글 이름 수리
- 원격: ${koWon || '미입력'}수 / 형격: ${koHyung || '미입력'}수 / 이격: ${koYi || '미입력'}수 / 정격: ${koJung || '미입력'}수

## 운영자 분석 메모
${memo || '(없음)'}

## 고객 프로파일 노트
${profileNote || '(없음)'}

---

위 정보를 바탕으로 WEROS Life Report를 한국어로 작성해주세요.

보고서 구조:
1. **삶의 설계도 — 사주 원국 해석** (일간 특성, 용신, 격국)
2. **이름이 만드는 운명** (수리 의미, 이름 에너지)
3. **지금 이 시간의 의미** (현재 대운, 고민과의 연결)
4. **WEROS 관점 — 당신의 브랜드 원형** (강점, 재능, 핵심 에너지)
5. **앞으로의 방향** (구체적 제안 2~3가지)

각 섹션을 충분히 깊고 따뜻하게, 1000자 내외로 작성해주세요.`;

  try {
    const apiRes = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!apiRes.ok) throw new Error('API 오류: ' + apiRes.status);
    const data = await apiRes.json();
    const reportText = data.content?.[0]?.text || '';

    // 간단한 HTML 변환 (마크다운 → HTML)
    const reportHtml = reportText
      .replace(/## (.+)/g, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    // Supabase 저장
    await supabaseFetch(
      'life_reports?id=eq.' + currentRequest.id,
      {
        method: 'PATCH',
        body: JSON.stringify({
          report_html: reportHtml,
          status: 'done'
        })
      }
    );

    // 로컬 업데이트
    currentRequest.status = 'done';
    currentRequest.reportHtml = reportHtml;

    // 사이드바 갱신
    const idx = ALL_REQUESTS.findIndex(x => x.id === currentRequest.id);
    if (idx >= 0) ALL_REQUESTS[idx].status = 'done';
    renderPersonList();

    document.getElementById('step3').style.opacity = '0.5';
    btn.textContent = '✦ 보고서 생성';
    btn.disabled = false;
    alert('✓ 보고서 생성 완료! 미리보기 버튼으로 확인하세요.');

  } catch(e) {
    console.error('보고서 생성 오류:', e);
    btn.textContent = '✦ 보고서 생성';
    btn.disabled = false;
    step2.classList.remove('active');
    alert('⚠ 오류: ' + e.message);
  }
}

// ══════════════════════════════════════════
// 수리 설명 표시 함수
// ══════════════════════════════════════════
const LUCK_LABEL = {5:'대길(大吉)', 4:'길(吉)', 3:'중길(中吉)', 2:'흉(凶)', 1:'대흉(大凶)'};

function showSuriDesc(inputId, val, descId) {
  var el = document.getElementById(descId);
  if (!el) return;
  var num = parseInt(val);
  if (!val || isNaN(num) || num < 1 || num > 81) {
    el.innerHTML = '';
    el.className = 'suri-desc-item';
    return;
  }
  var SURI_DB = (typeof SURI !== 'undefined') ? SURI : window.SURI;
  if (!SURI_DB) {
    el.innerHTML = '<div style="padding:10px 11px;font-size:11px;color:var(--muted)">&#9888; suri-db.js 로딩 필요</div>';
    el.classList.add('visible');
    return;
  }
  var data = SURI_DB[num];
  if (!data) return;
  var luckClass = 'luck-' + data.l;
  el.className = 'suri-desc-item visible ' + luckClass;
  el.innerHTML = '<div class="suri-desc-name">' + num + '수 &middot; ' + data.n +
    ' <span class="suri-luck-badge">' + (LUCK_LABEL[data.l]||'') + '</span></div>' +
    '<div class="suri-desc-text">' + data.d + '</div>';
}

function showGuaDesc(val, descId) {
  var el = document.getElementById(descId);
  if (!el) return;
  var num = parseInt(val);
  if (!val || isNaN(num) || num < 1 || num > 64) {
    el.innerHTML = '';
    el.className = 'gua-desc-box';
    return;
  }
  var GUA_DB = (typeof GUA_DATA !== 'undefined') ? GUA_DATA : window.GUA_DATA;
  if (!GUA_DB) {
    el.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:10px 11px">&#9888; suri-db.js 로딩 필요</div>';
    el.classList.add('visible');
    return;
  }
  var data = GUA_DB[num];
  if (!data) return;
  el.className = 'gua-desc-box visible';
  el.innerHTML = '<div class="gua-name"><span class="gua-sym">' + data.sym + '</span>' +
    num + '괘 &middot; ' + data.name + ' ' + data.hanja + '</div>' +
    '<div class="gua-meaning">' + data.meaning + '</div>' +
    '<div class="gua-desc-text">' + data.desc + '</div>';
}
